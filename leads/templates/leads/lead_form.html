<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-neutral-100">{% if lead %}Edit Lead{% else %}New Lead{% endif %}</h2>
        <button @click="show = false" class="text-neutral-500 hover:text-white">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <form hx-post="{% if lead %}{% url 'leads:lead-update' lead.pk %}{% else %}{% url 'leads:lead-create' %}{% endif %}"
          hx-swap="none" @htmx:after-request="if(event.detail.successful) show = false" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Business Name</label>
                <input type="text" name="business_name" value="{{ lead.business_name|default:'' }}" required
                       class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Contact Name</label>
                <input type="text" name="contact_name" value="{{ lead.contact_name|default:'' }}"
                       class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Email</label>
                <input type="email" name="email" value="{{ lead.email|default:'' }}"
                       class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Website</label>
                <input type="url" name="website" value="{{ lead.website|default:'' }}"
                       class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
            </div>
            <div class="col-span-full space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Problem Description</label>
                <textarea name="problem" rows="3"
                          class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none resize-none">{{ lead.problem|default:'' }}</textarea>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Score (0-100)</label>
                <input type="number" name="score" value="{{ lead.score|default:0 }}" min="0" max="100"
                       class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Status</label>
                <select name="status" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg py-2 px-3 text-sm focus:border-neutral-500 outline-none">
                    {% for val, label in form.fields.status.choices %}
                    <option value="{{ val }}" {% if lead.status == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex justify-end gap-3 pt-6">
            <button type="button" @click="show = false" class="px-6 py-2 rounded-lg text-sm font-bold text-neutral-400 hover:text-white transition-colors">
                Cancel
            </button>
            <button type="submit" class="bg-white text-black px-6 py-2 rounded-lg text-sm font-bold hover:bg-neutral-200 transition-colors">
                Save Lead
            </button>
        </div>
    </form>
</div>
<script>lucide.createIcons();</script>
