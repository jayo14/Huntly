<div class="p-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-2xl font-bold text-surface-950">{% if lead %}Edit Lead{% else %}New Lead{% endif %}</h2>
            <p class="text-surface-500 text-sm mt-1">Manage your lead details.</p>
        </div>
        <button @click="show = false" class="text-surface-400 hover:text-surface-950 transition-colors">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <form hx-post="{% if lead %}{% url 'leads:lead-update' lead.pk %}{% else %}{% url 'leads:lead-create' %}{% endif %}"
          hx-swap="none" @htmx:after-request="if(event.detail.successful) show = false" class="space-y-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Business Name</label>
                <input type="text" name="business_name" value="{{ lead.business_name|default:'' }}" required
                       class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Contact Name</label>
                <input type="text" name="contact_name" value="{{ lead.contact_name|default:'' }}"
                       class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Email</label>
                <input type="email" name="email" value="{{ lead.email|default:'' }}"
                       class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Website</label>
                <input type="url" name="website" value="{{ lead.website|default:'' }}"
                       class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div class="col-span-full space-y-2">
                <label class="block text-sm font-bold text-surface-700">Problem Description</label>
                <textarea name="problem" rows="3"
                          class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all resize-none">{{ lead.problem|default:'' }}</textarea>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Score (0-100)</label>
                <input type="number" name="score" value="{{ lead.score|default:0 }}" min="0" max="100"
                       class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-bold text-surface-700">Status</label>
                <select name="status" class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
                    {% for val, label in form.fields.status.choices %}
                    <option value="{{ val }}" {% if lead.status == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="flex justify-end space-x-3 pt-8 border-t border-surface-200">
            <button type="button" @click="show = false" class="px-6 py-2.5 rounded-xl border border-surface-200 font-bold hover:bg-surface-100 transition-all text-surface-700">
                Cancel
            </button>
            <button type="submit" class="bg-primary-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-primary-500 transition-all shadow-lg shadow-primary-600/20 flex items-center">
                Save Lead
            </button>
        </div>
    </form>
</div>
<script>lucide.createIcons();</script>
