{% extends "base.html" %}

{% block title %}Leads | Huntly{% endblock %}
{% block header_title %}Leads Management{% endblock %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div class="flex flex-1 items-center gap-4">
        <div class="relative flex-1 max-w-md">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-surface-400"></i>
            <input type="text" name="search" placeholder="Search leads..."
                   class="w-full bg-surface-100 border border-surface-200 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-surface-950 placeholder:text-surface-400"
                   hx-get="{% url 'leads:lead-list' %}"
                   hx-trigger="keyup changed delay:500ms"
                   hx-target="#leads-table-container"
                   hx-include="[name='status'], [name='needs_action']">
        </div>

        <select name="status"
                class="bg-surface-100 border border-surface-200 rounded-xl py-2.5 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-surface-950"
                hx-get="{% url 'leads:lead-list' %}"
                hx-target="#leads-table-container"
                hx-include="[name='search'], [name='needs_action']">
            <option value="">All Statuses</option>
            {% for value, label in status_choices %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>

        <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" name="needs_action" value="true"
                   class="w-4 h-4 rounded border-surface-300 bg-surface-100 text-primary-600 focus:ring-0 focus:ring-offset-0">
            <span class="text-sm text-surface-500 group-hover:text-surface-950 transition-colors">Needs Action</span>
        </label>
    </div>

    <button hx-get="{% url 'leads:lead-create' %}" hx-target="#modal-content"
            class="bg-primary-600 text-white hover:bg-primary-500 px-6 py-2.5 rounded-xl text-sm font-bold flex items-center transition-all shadow-lg shadow-primary-600/20">
        <i data-lucide="plus" class="w-4 h-4 mr-2"></i>
        New Lead
    </button>
</div>

<div id="leads-table-container" hx-trigger="leadsChanged from:body" hx-get="{% url 'leads:lead-list' %}" hx-target="this">
    {% include "leads/partials/lead_list_table.html" %}
</div>
{% endblock %}
