<div class="bg-surface-100 border border-surface-200 rounded-2xl overflow-hidden shadow-sm">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="border-b border-surface-200 bg-surface-50">
                <th class="px-6 py-4 text-[10px] font-bold text-surface-400 uppercase tracking-wider">Business</th>
                <th class="px-6 py-4 text-[10px] font-bold text-surface-400 uppercase tracking-wider">Problem</th>
                <th class="px-6 py-4 text-[10px] font-bold text-surface-400 uppercase tracking-wider text-center">Score</th>
                <th class="px-6 py-4 text-[10px] font-bold text-surface-400 uppercase tracking-wider">Status</th>
                <th class="px-6 py-4 text-[10px] font-bold text-surface-400 uppercase tracking-wider text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-surface-200">
            {% for lead in leads %}
            <tr class="hover:bg-surface-200/50 transition-colors group cursor-pointer"
                onclick="if(!event.target.closest('button') && !event.target.closest('select')) htmx.ajax('GET', '{% url 'leads:lead-detail' lead.pk %}', {target:'#modal-content'})">
                <td class="px-6 py-4">
                    <div class="font-bold text-surface-950">{{ lead.business_name }}</div>
                    <div class="text-[10px] text-surface-500">{{ lead.website|default:"" }}</div>
                </td>
                <td class="px-6 py-4">
                    <div class="text-sm text-surface-600 line-clamp-1 max-w-md">{{ lead.problem|default:"-" }}</div>
                </td>
                <td class="px-6 py-4 text-center">
                    <span class="inline-flex items-center justify-center w-8 h-8 rounded-full text-xs font-bold
                        {% if lead.score >= 80 %}bg-emerald-500/10 text-emerald-500 border border-emerald-500/20
                        {% elif lead.score >= 50 %}bg-amber-500/10 text-amber-500 border border-amber-500/20
                        {% else %}bg-surface-200 text-surface-500 border border-surface-300{% endif %}">
                        {{ lead.score }}
                    </span>
                </td>
                <td class="px-6 py-4">
                    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold border
                        {% if lead.status == 'new' %}bg-surface-200 text-surface-500 border-surface-300
                        {% elif lead.status == 'contacted' %}bg-blue-500/10 text-blue-500 border-blue-500/20
                        {% elif lead.status == 'replied' %}bg-emerald-500/10 text-emerald-500 border-emerald-500/20
                        {% elif lead.status == 'proposal' %}bg-purple-500/10 text-purple-500 border-purple-500/20
                        {% elif lead.status == 'closed' %}bg-primary-600 text-white border-primary-500
                        {% endif %}">
                        {{ lead.get_status_display|upper }}
                    </span>
                </td>
                <td class="px-6 py-4 text-right">
                    <button hx-get="{% url 'leads:lead-update' lead.pk %}" hx-target="#modal-content"
                            class="p-2 text-surface-400 hover:text-primary-500 hover:bg-primary-500/10 rounded-lg transition-all">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </button>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="px-6 py-20 text-center">
                    <div class="flex flex-col items-center justify-center">
                        <i data-lucide="users" class="w-12 h-12 text-surface-200 mb-4"></i>
                        <p class="text-surface-500 font-medium">No leads found matching your criteria.</p>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<script>lucide.createIcons();</script>
