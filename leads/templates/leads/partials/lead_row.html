<tr id="lead-{{ lead.id }}">
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ lead.business_name }}</div>
        <div class="text-sm text-gray-500">{{ lead.website|default:"" }}</div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm text-gray-900">{{ lead.contact_name|default:"N/A" }}</div>
        <div class="text-sm text-gray-500">{{ lead.email|default:"" }}</div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <select name="status"
                hx-post="{% url 'leads:update-status' lead.pk %}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="text-sm rounded-full px-3 py-1 font-semibold focus:outline-none
                {% if lead.status == 'new' %}bg-blue-100 text-blue-800
                {% elif lead.status == 'contacted' %}bg-yellow-100 text-yellow-800
                {% elif lead.status == 'replied' %}bg-indigo-100 text-indigo-800
                {% elif lead.status == 'proposal' %}bg-purple-100 text-purple-800
                {% elif lead.status == 'closed' %}bg-green-100 text-green-800{% endif %}">
            {% for value, label in lead.STATUS_CHOICES %}
                <option value="{{ value }}" {% if lead.status == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
            {{ lead.score }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
        <button hx-get="{% url 'leads:lead-update' lead.pk %}"
                hx-target="#modal-content"
                class="text-indigo-600 hover:text-indigo-900">Edit</button>
        <button hx-post="{% url 'leads:lead-delete' lead.pk %}"
                hx-confirm="Are you sure you want to delete this lead?"
                class="text-red-600 hover:text-red-900">Delete</button>
    </td>
</tr>
