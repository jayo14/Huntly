<div class="space-y-6">
    {% for job in jobs %}
    <div class="p-4 bg-neutral-800/20 border border-neutral-800 rounded-xl">
        <div class="flex justify-between items-start mb-3">
            <div class="flex-1 min-w-0 mr-3">
                <h4 class="font-bold text-sm text-white truncate">{{ job.name }}</h4>
                <p class="text-[10px] text-neutral-500 truncate">{{ job.niche }} • {{ job.region }}</p>
            </div>
            <button hx-post="{% url 'leads:scraper-terminate' job.pk %}" 
                    hx-confirm="Stop this scraping session?"
                    class="p-1.5 text-neutral-500 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-all"
                    title="Stop Session">
                <i data-lucide="square" class="w-4 h-4 fill-current"></i>
            </button>
        </div>
        
        <div class="w-full bg-neutral-800 rounded-full h-1.5 mb-2">
            <div class="bg-primary-500 h-1.5 rounded-full transition-all duration-500" style="width: {{ job.progress }}%"></div>
        </div>
        
        <div class="flex justify-between items-center text-[10px]">
            <span class="text-neutral-500">{{ job.progress }}% Complete</span>
            <span class="text-primary-400 font-bold">{{ job.leads_found }} leads found</span>
        </div>
    </div>
    {% empty %}
    <div class="text-center py-4">
        <div class="w-12 h-12 bg-neutral-800 rounded-full flex items-center justify-center mx-auto mb-3">
            <i data-lucide="coffee" class="w-6 h-6 text-neutral-600"></i>
        </div>
        <p class="text-xs text-neutral-500">No active jobs. Start a new scrape to see progress here.</p>
    </div>
    {% endfor %}
</div>

<script>
    lucide.createIcons();
</script>
