<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for job in jobs %}
    <div class="p-6 bg-surface-100 border border-surface-200 rounded-3xl shadow-sm relative overflow-hidden group">
        <div class="flex justify-between items-start mb-6">
            <div class="flex-1 min-w-0 mr-4">
                <h4 class="font-bold text-base text-surface-950 truncate">{{ job.name }}</h4>
                <div class="flex items-center text-[10px] text-surface-500 font-bold uppercase tracking-wider mt-1">
                    <i data-lucide="map-pin" class="w-3 h-3 mr-1 opacity-50"></i>
                    {{ job.region }}
                </div>
            </div>
            <button hx-post="{% url 'leads:scraper-terminate' job.pk %}" 
                    hx-confirm="Stop this scraping session?"
                    class="p-2 text-surface-400 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all"
                    title="Stop Session">
                <i data-lucide="square" class="w-4 h-4 fill-current"></i>
            </button>
        </div>
        
        <div class="space-y-3">
            <div class="flex justify-between items-center text-xs">
                <span class="text-surface-500 font-medium">Scraping Progress</span>
                <span class="text-primary-600 font-bold">{{ job.progress }}%</span>
            </div>
            <div class="w-full bg-surface-200 rounded-full h-2 overflow-hidden">
                <div class="bg-primary-500 h-full rounded-full transition-all duration-1000 ease-out relative" style="width: {{ job.progress }}%">
                    <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                </div>
            </div>
        </div>
        
        <div class="mt-6 flex items-center justify-between">
            <div class="flex items-center text-emerald-500 font-bold text-sm">
                <i data-lucide="users" class="w-4 h-4 mr-2"></i>
                {{ job.leads_found }} <span class="text-[10px] uppercase ml-1 opacity-70">Leads Found</span>
            </div>
            <div class="flex space-x-1">
                <div class="w-1.5 h-1.5 bg-primary-500 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-primary-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
                <div class="w-1.5 h-1.5 bg-primary-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-span-full flex flex-col items-center justify-center py-12 text-center bg-surface-50/50 rounded-3xl border border-dashed border-surface-200">
        <div class="w-16 h-16 bg-surface-100 rounded-full flex items-center justify-center mb-4 text-surface-300">
            <i data-lucide="coffee" class="w-8 h-8"></i>
        </div>
        <p class="text-sm text-surface-500 font-medium">No active scraping sessions. Sit back and relax!</p>
    </div>
    {% endfor %}
</div>

<script>
    lucide.createIcons();
</script>
