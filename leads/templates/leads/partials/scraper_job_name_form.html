<div class="p-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-2xl font-bold text-surface-950">Rename Session</h2>
            <p class="text-surface-500 text-sm mt-1">Give your scraping session a clear name.</p>
        </div>
        <button @click="show = false" class="text-surface-400 hover:text-surface-950 transition-colors">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <form hx-post="{% url 'leads:scraper-job-rename' job.pk %}" 
          hx-target="#modal-content"
          class="space-y-6">
        {% csrf_token %}
        
        <div class="space-y-4">
            <label class="block text-sm font-bold text-surface-700 mb-2">Session Name</label>
            <input type="text" name="name" value="{{ job.name }}" 
                   class="w-full bg-surface-50 border border-surface-200 rounded-2xl px-6 py-4 text-surface-950 focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                   placeholder="e.g. Miami Dentists 2024" required>
        </div>

        <div class="flex justify-end space-x-3 pt-8 border-t border-surface-200">
            <button type="button" @click="show = false" class="px-6 py-2.5 rounded-xl border border-surface-200 font-bold hover:bg-surface-100 transition-all text-surface-700">
                Cancel
            </button>
            <button type="submit" class="bg-primary-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-primary-500 transition-all shadow-lg shadow-primary-600/20">
                Save Changes
            </button>
        </div>
    </form>
</div>

<script>
    lucide.createIcons();
</script>
