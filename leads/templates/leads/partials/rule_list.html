<div class="overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="text-[10px] font-bold text-surface-400 uppercase tracking-widest border-b border-surface-200">
                <th class="px-8 py-5">Sequence Name</th>
                <th class="px-8 py-5">Trigger</th>
                <th class="px-8 py-5">Target Status</th>
                <th class="px-8 py-5">Delay</th>
                <th class="px-8 py-5">Status</th>
                <th class="px-8 py-5 text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-surface-200">
            {% for rule in rules %}
                {% include 'leads/partials/rule_row.html' %}
            {% empty %}
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-neutral-500">
                        No automation sequences found. Create one to get started.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
