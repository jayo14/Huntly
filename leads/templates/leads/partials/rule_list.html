<div class="overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="text-xs font-bold text-neutral-500 uppercase tracking-wider border-b border-neutral-800">
                <th class="px-6 py-4">Sequence Name</th>
                <th class="px-6 py-4">Trigger</th>
                <th class="px-6 py-4">Target Status</th>
                <th class="px-6 py-4">Delay</th>
                <th class="px-6 py-4">Status</th>
                <th class="px-6 py-4 text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-neutral-800">
            {% for rule in rules %}
                {% include 'leads/partials/rule_row.html' %}
            {% empty %}
                <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-neutral-500">
                        No automation sequences found. Create one to get started.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
