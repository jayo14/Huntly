<tr class="hover:bg-surface-200/50 transition-all group">
    <td class="px-8 py-5">
        <span class="font-bold text-surface-950">{{ rule.name }}</span>
    </td>
    <td class="px-8 py-5">
        <span class="text-sm text-surface-500 font-medium">{{ rule.get_trigger_type_display }}</span>
    </td>
    <td class="px-8 py-5">
        <span class="text-[10px] font-bold px-3 py-1.5 rounded-full bg-surface-200 text-surface-600 border border-surface-300">
            {{ rule.get_target_status_display|default:"ALL STATUSES"|upper }}
        </span>
    </td>
    <td class="px-8 py-5">
        <span class="text-sm text-surface-500 font-bold">{{ rule.delay_hours }}h</span>
    </td>
    <td class="px-8 py-5">
        <button hx-post="{% url 'leads:toggle-rule' rule.pk %}" hx-target="closest tr" hx-swap="outerHTML" class="relative inline-flex items-center cursor-pointer group/toggle">
            <div class="w-11 h-6 bg-surface-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all {% if rule.is_active %}bg-primary-600{% endif %}"></div>
            {% if rule.is_active %}
                <div class="absolute left-1.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-sm transition-all translate-x-5"></div>
            {% else %}
                <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow-sm transition-all"></div>
            {% endif %}
        </button>
    </td>
    <td class="px-8 py-5 text-right">
        <div class="flex items-center justify-end space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button hx-get="{% url 'leads:rule-update' rule.pk %}" hx-target="#modal-content" class="p-2 text-surface-400 hover:text-primary-500 hover:bg-primary-500/10 rounded-xl transition-all">
                <i data-lucide="edit-3" class="w-4 h-4"></i>
            </button>
            <button hx-post="{% url 'leads:rule-delete' rule.pk %}" hx-confirm="Are you sure you want to delete this sequence?" hx-target="closest tr" hx-swap="delete" class="p-2 text-surface-400 hover:text-red-500 hover:bg-red-500/10 rounded-xl transition-all">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>
    </td>
</tr>

<script>
    lucide.createIcons();
</script>
